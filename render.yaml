# Render Blueprint — RentalAI（Phase5：公网部署）
#
# 若静态 UI 部署在 Vercel、仅本仓库作 API：可只部署 rentalai-api；前端在 index.html 配置
# rentalai-api-base 指向本服务公网 URL（见 rental_app/DEPLOYMENT_PLAN.md）。
#
# 仓库根为 python_learning、代码在 rental_app/ 时保持 rootDir: rental_app。
# 若 Git 仓库根就是 rental_app/，请删除两个服务下的 rootDir 字段。
#
# Phase3 产品（首页/登录/分析/历史）全部由 rentalai-api 提供 → 公网链接即该服务的 URL。
# rentalai-ui（Streamlit）为可选第二站点；仅需 Phase3 时可不在 Dashboard 创建该服务。
#
# 文档：https://render.com/docs/blueprint-spec
#
# Phase17 / Phase18：FastAPI ASGI 模块为 api_server:app（不是 main:app）。PORT 由平台注入。
#
# Phase18 Step1-2 — 构建：最小为「pip install -r requirements.txt」（相对 rootDir）。
# 本仓库含 playwright 抓取链路，故在 API/UI 两服务的 buildCommand 中追加
# 「&& playwright install chromium」以保持现有功能；纯 API 且无需浏览器时可删后缀以缩短构建。
#
# requirements.txt 路径：rootDir 为 rental_app 时使用 rental_app/requirements.txt。

services:
  - type: web
    name: rentalai-api
    runtime: python
    region: oregon
    plan: free
    rootDir: rental_app
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: uvicorn api_server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: RENTALAI_ENV
        value: production
      # 分域部署：填正式前端 origin，逗号分隔。未设则 CORS 默认为 *（config.get_cors_origins）
      - key: ALLOWED_ORIGINS
        sync: false
      # 托管 PostgreSQL 时在 Dashboard 绑定实例后写入；未设则用户库等走 SQLite（实例本地盘）
      - key: DATABASE_URL
        sync: false

  - type: web
    name: rentalai-ui
    runtime: python
    region: oregon
    plan: free
    rootDir: rental_app
    # Playwright 下载 Chromium；构建可能较慢，若失败需在 Dashboard 调高超时或使用 Docker 运行时
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: streamlit run app_web.py --server.port $PORT --server.address 0.0.0.0
    healthCheckPath: /
    envVars:
      # 进程内分析 + Agent/真实抓取；与本地 README 默认一致
      - key: RENTALAI_USE_LOCAL
        value: "1"
      # 填 FastAPI 服务公网地址，例如 https://rentalai-api.onrender.com（无尾部斜杠）
      - key: RENTALAI_API_URL
        sync: false
      # 可选：持久化 listings.json 到挂载盘路径（需先在 Dashboard 为该 Web Service 添加 Disk）
      # - key: RENTALAI_LISTINGS_PATH
      #   value: /opt/rentalai-data/listings.json
