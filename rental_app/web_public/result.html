<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="rentalai-api-base" content="" />
    <meta name="vite-rentalai-api-base" content="" />
    <meta name="rentalai-env" content="" />
    <title>Your RentalAI Analysis Result</title>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body class="analysis-result-page-body">
    <script src="/assets/auth_user_store.js"></script>
    <script src="/assets/auth_local.js"></script>
    <nav class="top-nav demo-unified-nav" id="demo-unified-nav" aria-label="Main"></nav>

    <main class="wrap wrap-wide analysis-result-main" lang="en-GB">
      <p class="back-link">
        <a href="/">Home</a>
        <span class="nav-sep">·</span>
        <a href="/start">Start Analysis</a>
      </p>

      <header class="analysis-result-header">
        <p class="saas-hero-kicker">RentalAI</p>
        <h1 class="analysis-result-title">Your RentalAI Analysis Result</h1>
        <p class="hint analysis-result-lead">
          Here is a clear summary of the AI analysis for this rental option.
        </p>
      </header>

      <section class="card card-header-block analysis-recommendation-card">
        <h2 class="section-title">Final Recommendation</h2>
        <p class="analysis-recommendation-row">
          <span class="analysis-recommendation-label">Final Recommendation:</span>
          <strong id="analysis-recommendation-badge" class="analysis-recommendation-badge">
            Caution
          </strong>
        </p>
      </section>

      <section class="card">
        <h2 class="section-title">Why</h2>
        <ul id="analysis-why-list" class="analysis-bullet-list"></ul>
      </section>

      <section class="card">
        <h2 class="section-title">Main Risks</h2>
        <ul id="analysis-risks-list" class="analysis-bullet-list"></ul>
      </section>

      <section class="card">
        <h2 class="section-title">Next Step</h2>
        <ul id="analysis-next-step-list" class="analysis-bullet-list"></ul>
      </section>

      <section class="card">
        <h2 class="section-title">Location Insight</h2>
        <ul id="analysis-location-list" class="analysis-bullet-list"></ul>
      </section>

      <section class="card">
        <h2 class="section-title">Reputation Check</h2>
        <ul id="analysis-reputation-list" class="analysis-bullet-list"></ul>
      </section>
    </main>
    <script src="/assets/unified_result_page.js"></script>
  </body>
</html>
