<!DOCTYPE html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>合同分析 · Contract Analysis · RentalAI</title>
    <link rel="stylesheet" href="/assets/style.css" />
    <script src="/assets/api_config.js"></script>
  </head>
  <body>
    <script src="/assets/auth_local.js"></script>
    <nav class="top-nav demo-unified-nav" id="demo-unified-nav" aria-label="Main"></nav>

    <main class="wrap wrap-wide result-wrap">
      <p class="back-link"><a href="/">← 首页</a></p>
      <header class="page-header">
        <h1>合同分析 <span class="hint muted" style="font-weight: normal">Contract Analysis</span></h1>
        <p class="hint muted">粘贴租约正文或选择本地合同文件（后续将接入分析 API）。</p>
      </header>

      <section class="card form-card" aria-labelledby="contract-paste-heading">
        <h2 id="contract-paste-heading" class="section-title">粘贴合同文本</h2>
        <p class="hint">将租约或合同全文粘贴到下方文本框。</p>
        <label class="field-label" for="contract-text-paste">合同正文</label>
        <textarea
          id="contract-text-paste"
          name="contract_text"
          rows="12"
          placeholder="在此粘贴合同全文（.txt 可直接粘贴；PDF/Word 可先导出为文本再粘贴）…"
        ></textarea>
        <div class="actions-row">
          <button type="button" id="contract-analyze-placeholder" disabled title="分析接口将在后续步骤接入">
            分析（即将接入）
          </button>
        </div>
      </section>

      <section class="card form-card" aria-labelledby="contract-file-heading">
        <h2 id="contract-file-heading" class="section-title">上传 / 选择合同文件</h2>
        <p class="hint">选择本地 .txt / .pdf / .docx（浏览器端选择；上传至服务器与解析将在后续步骤接入）。</p>
        <label class="field-label" for="contract-file-input">合同文件</label>
        <input type="file" id="contract-file-input" accept=".txt,.pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,text/plain" />
        <p class="hint muted small-print" id="contract-file-name" aria-live="polite"></p>
      </section>
    </main>
    <script src="/assets/contract_analysis_page.js"></script>
  </body>
</html>
