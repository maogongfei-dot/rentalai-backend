<!DOCTYPE html>
<!--
  Phase 4 Round6 收口：统一「分析历史」页（/analysis-history）
  - 双模式：未登录 → 仅本地 guest；已登录 → GET /api/analysis/history/records + Bearer，失败回退本机（Phase5 Round5 Step3）
  - 本地键：rentalai_unified_analysis_history_v1__{guest|userId}；写入见 analysis_history_persist（guest 写本地；登录默认后端写）
  - UI：loading/回退提示 + 来源横幅（guest 本机 / 账户云端）；调试 ?server_history=1 控制台探测
  - 全量手动保存：/history（仅 localStorage）· 主说明 rental_app/README.md「Phase 5 第四轮」「统一分析历史」
-->
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>分析历史 · Analysis History · RentalAI</title>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body class="analysis-history-page-body">
    <script src="/assets/auth_user_store.js"></script>
    <script src="/assets/auth_local.js"></script>
    <nav class="top-nav demo-unified-nav" id="demo-unified-nav" aria-label="Main"></nav>

    <main class="wrap wrap-wide result-wrap analysis-history-page">
      <p class="back-link main-flow-switch" aria-label="返回">
        <a href="/">← 首页</a>
      </p>

      <header class="page-header">
        <h1>分析历史 <span class="hint muted" style="font-weight: normal">Analysis History</span></h1>
        <p id="analysis-history-lead" class="hint muted analysis-history-lead">
          <strong>访客</strong>：仅本机保存的最近分析摘要（不上传账户）。<strong>登录</strong>后本页<strong>优先</strong>显示与账号同步的记录。全量手动快照仍从<a href="/history">保存列表</a>进入。
        </p>
        <p id="analysis-history-toolbar" class="analysis-history-toolbar hint muted small-print hidden">
          <button type="button" id="analysis-history-refresh-btn" class="btn-history-primary">
            刷新云端列表
          </button>
          <span lang="en">Refresh cloud history</span>
        </p>
      </header>

      <div id="history-access-banner" class="history-access-banner"></div>
      <p id="history-cloud-load-hint" class="history-cloud-load-hint hidden" role="status" aria-live="polite"></p>
      <p id="history-server-notice" class="history-server-notice hidden" role="status" aria-live="polite"></p>

      <section
        class="card analysis-history-block"
        aria-labelledby="prop-history-heading"
        data-unified-history-section="property"
      >
        <h2 id="prop-history-heading" class="section-title">Property Analysis History</h2>
        <p class="hint muted analysis-history-block-sub">房源分析 · 最近自动摘要</p>
        <p class="hint muted small-print unified-history-block-links">
          手动保存的全量快照与列表项详情：
          <a href="/history">打开保存列表</a>
          · <a href="/#ai-rental-heading">新建房源分析</a>
        </p>
        <div
          id="unified-history-property-list"
          class="unified-history-mount"
          aria-live="polite"
          aria-busy="false"
        ></div>
      </section>

      <section
        class="card analysis-history-block"
        aria-labelledby="contract-history-heading"
        data-unified-history-section="contract"
      >
        <h2 id="contract-history-heading" class="section-title">Contract Analysis History</h2>
        <p class="hint muted analysis-history-block-sub">合同分析 · 最近自动摘要</p>
        <p class="hint muted small-print unified-history-block-links">
          <a href="/contract-analysis">前往合同分析</a>
        </p>
        <div
          id="unified-history-contract-list"
          class="unified-history-mount"
          aria-live="polite"
          aria-busy="false"
        ></div>
      </section>
    </main>
    <script src="/assets/api_config.js"></script>
    <script src="/assets/analysis_history_store.js"></script>
    <script src="/assets/analysis_history_persist.js"></script>
    <script src="/assets/history_access_context.js"></script>
    <script src="/assets/server_history_api.js"></script>
    <script src="/assets/analysis_history_source.js"></script>
    <script src="/assets/analysis_history_page.js"></script>
  </body>
</html>
