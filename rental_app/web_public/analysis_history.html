<!DOCTYPE html>
<!--
  Phase 4 Round6：统一「分析历史」入口页（Step1 骨架 + Step2 本地最近记录）
  全量手动保存仍见 /history；本页展示 rentalai_unified_analysis_history_v1 轻量摘要。
-->
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>分析历史 · Analysis History · RentalAI</title>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <script src="/assets/auth_local.js"></script>
    <nav class="top-nav demo-unified-nav" id="demo-unified-nav" aria-label="Main"></nav>

    <main class="wrap wrap-wide result-wrap analysis-history-page">
      <p class="back-link main-flow-switch" aria-label="返回">
        <a href="/">← 首页</a>
      </p>

      <header class="page-header">
        <h1>分析历史 <span class="hint muted" style="font-weight: normal">Analysis History</span></h1>
        <p class="hint muted analysis-history-lead">
          以下为浏览器本地保存的<strong>最近分析摘要</strong>（自动写入）；全量快照与详情仍可从房源历史列表进入。
        </p>
      </header>

      <section class="card analysis-history-block" aria-labelledby="prop-history-heading">
        <h2 id="prop-history-heading" class="section-title">Property Analysis History</h2>
        <p class="hint muted">房源分析 · 最近摘要（自动）与 <a href="/history">完整保存列表</a></p>
        <div id="unified-history-property-list" class="unified-history-mount" aria-live="polite"></div>
      </section>

      <section class="card analysis-history-block" aria-labelledby="contract-history-heading">
        <h2 id="contract-history-heading" class="section-title">Contract Analysis History</h2>
        <p class="hint muted">合同分析 · 最近摘要（自动）</p>
        <p class="analysis-history-block-action">
          <a href="/contract-analysis">前往合同分析</a>
        </p>
        <div id="unified-history-contract-list" class="unified-history-mount" aria-live="polite"></div>
      </section>
    </main>
    <script src="/assets/analysis_history_store.js"></script>
    <script src="/assets/analysis_history_page.js"></script>
  </body>
</html>
