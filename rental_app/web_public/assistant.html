<!DOCTYPE html>
<!--
  Phase 4 Round7 收口：/assistant 先说需求 → 本地 intent 分流 → 跳转预填（见 README「智能入口」）
-->
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="rentalai-api-base" content="" />
    <meta name="vite-rentalai-api-base" content="" />
    <meta name="rentalai-env" content="" />
    <title>智能入口 · AI Assistant · RentalAI</title>
    <link rel="stylesheet" href="/assets/style.css" />
    <script src="/assets/api_config.js"></script>
  </head>
  <body class="assistant-page-body">
    <script src="/assets/auth_user_store.js"></script>
    <script src="/assets/auth_local.js"></script>
    <nav class="top-nav demo-unified-nav" id="demo-unified-nav" aria-label="Main"></nav>

    <main class="wrap wrap-wide result-wrap assistant-page">
      <p class="back-link main-flow-switch" aria-label="返回">
        <a href="/">← 首页</a>
      </p>

      <header class="page-header assistant-page-header">
        <h1>智能入口 <span class="hint muted" style="font-weight: normal">AI Assistant</span></h1>
        <p class="hint assistant-page-tagline" lang="en">
          Tell RentalAI what you want help with.
        </p>
        <p class="hint muted assistant-page-tagline-zh">
          Describe a property search or a contract question — 再进入房源分析或合同分析。
        </p>
      </header>

      <section class="card form-card assistant-card" aria-labelledby="assistant-form-heading">
        <h2 id="assistant-form-heading" class="section-title">Describe what you need</h2>
        <label class="field-label" for="assistant-input">你的描述</label>
        <textarea
          id="assistant-input"
          name="assistant_input"
          rows="6"
          placeholder="例如：我想在伦敦找两居室，预算每月 2000 镑以内… / 请帮我看看这份租约里的押金条款有没有坑…"
        ></textarea>
        <div class="actions-row">
          <button type="button" id="assistant-submit" class="assistant-submit-btn">
            分析意图并继续
          </button>
        </div>
        <p id="assistant-msg" class="hint save-banner save-banner-ok hidden" role="status" aria-live="polite"></p>
        <div id="assistant-intent-panel" class="assistant-intent-panel hidden" aria-live="polite">
          <div id="assistant-intent-body" class="assistant-intent-body"></div>
        </div>
        <p class="hint muted small-print assistant-page-footnote">
          识别为房源或合同时将<strong>自动跳转</strong>；未明确时在下方二选一。描述经 sessionStorage 带到目标页预填。
        </p>
        <p class="hint small-print assistant-page-links">
          <a href="/#ai-rental-heading">前往房源分析</a>
          <span class="nav-sep">·</span>
          <a href="/contract-analysis">前往合同分析</a>
          <span class="nav-sep">·</span>
          <a href="/analysis-history">分析历史</a>
        </p>
      </section>
    </main>
    <script src="/assets/assistant_intent.js"></script>
    <script src="/assets/assistant_page.js"></script>
  </body>
</html>
