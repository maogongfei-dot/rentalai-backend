<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="rentalai-api-base" content="" />
    <meta name="vite-rentalai-api-base" content="" />
    <meta name="rentalai-env" content="" />
    <title>Analyzing · RentalAI</title>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body class="analyzing-page-body">
    <script src="/assets/auth_user_store.js"></script>
    <script src="/assets/auth_local.js"></script>
    <nav class="top-nav demo-unified-nav" id="demo-unified-nav" aria-label="Main"></nav>

    <main class="wrap wrap-wide analyzing-main" lang="en-GB">
      <section class="card saas-hero analyzing-card" aria-live="polite">
        <div class="analyzing-spinner" aria-hidden="true"></div>
        <h1 class="analyzing-title">AI is analysing your rental option</h1>
        <p class="hint analyzing-lead">
          We are checking the rental details, risks, location signals and next-step recommendations.
        </p>

        <ul class="analyzing-step-list">
          <li>Reading property details</li>
          <li>Checking contract and cost risks</li>
          <li>Reviewing location signals</li>
          <li>Preparing your recommendation</li>
        </ul>

        <p class="hint muted small-print" id="analyzing-status-text">
          Finalizing your analysis...
        </p>
      </section>
    </main>
    <script src="/assets/api_config.js"></script>
    <script>
      (function () {
        var mockBody = {
          rent: 1250,
          budget: 1500,
          commute_minutes: 30,
          bedrooms: 1,
          bills_included: false,
          area: "Manchester",
          postcode: "M1",
        };

        function goError() {
          window.location.href = "/analysis-error";
        }

        function goSuccess(data) {
          try {
            localStorage.setItem("rentalai_latest_result_v1", JSON.stringify(data));
            sessionStorage.setItem("rentalai_direct_analyze_result_v1", JSON.stringify(data));
          } catch (e) {
            goError();
            return;
          }
          window.location.href = "/ai-result";
        }

        function run() {
          var init = {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(mockBody),
          };
          if (typeof window.rentalaiMergeAuthHeaders === "function") {
            init.headers = window.rentalaiMergeAuthHeaders(init.headers);
          }
          var req =
            typeof window.rentalaiApiFetch === "function"
              ? window.rentalaiApiFetch("/analyze", init)
              : fetch(
                  typeof window.rentalaiApiUrl === "function"
                    ? window.rentalaiApiUrl("/analyze")
                    : "/analyze",
                  init
                );
          req
            .then(function (r) {
              if (!r.ok) throw new Error("analyze_http_" + r.status);
              return r.json();
            })
            .then(goSuccess)
            .catch(goError);
        }

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", run);
        } else {
          run();
        }
      })();
    </script>
  </body>
</html>
