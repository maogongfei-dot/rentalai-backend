<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="rentalai-api-base" content="" />
    <meta name="vite-rentalai-api-base" content="" />
    <meta name="rentalai-env" content="" />
    <title>Analyzing your rental property... · RentalAI</title>
    <link rel="stylesheet" href="/assets/style.css" />
    <style>
      /* Phase11 Step1-4: loading 页产品化（不改动全局 style.css） */
      body.analyzing-page-body {
        max-width: none;
        width: 100%;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: linear-gradient(175deg, #eef2f7 0%, #e8edf4 50%, #f1f5f9 100%);
        box-sizing: border-box;
      }
      body.analyzing-page-body .analyzing-main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.25rem 2.5rem;
        max-width: 28rem;
        margin: 0 auto;
        width: 100%;
        box-sizing: border-box;
      }
      body.analyzing-page-body .analyzing-card--p11 {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 1rem;
        padding: 2rem 1.5rem 1.85rem;
        margin: 0;
        border-radius: 16px;
        border: 1px solid #e2e8f0;
        background: #fff;
        box-shadow: 0 4px 24px rgba(15, 23, 42, 0.08);
        box-sizing: border-box;
      }
      body.analyzing-page-body .analyzing-title {
        margin: 0.35rem 0 0;
        max-width: 20rem;
      }
      body.analyzing-page-body .analyzing-lead {
        text-align: center;
        max-width: 24rem;
        margin: 0;
        color: #64748b;
        font-size: 0.95rem;
        line-height: 1.5;
      }
      body.analyzing-page-body .analyzing-step-list {
        text-align: left;
        margin: 0.15rem auto 0;
        width: 100%;
        max-width: 22rem;
        padding-left: 1.2rem;
        line-height: 1.55;
        color: #334155;
        font-size: 0.94rem;
      }
      body.analyzing-page-body .analyzing-step-list li {
        margin-bottom: 0.45rem;
      }
      body.analyzing-page-body .analyzing-step-list li:last-child {
        margin-bottom: 0;
      }
      body.analyzing-page-body .analyzing-spinner {
        width: 2.6rem;
        height: 2.6rem;
        flex-shrink: 0;
      }
      body.analyzing-page-body #analyzing-status-text {
        margin: 0.15rem 0 0;
        color: #64748b;
        font-size: 0.88rem;
      }
    </style>
  </head>
  <body class="analyzing-page-body">
    <script src="/assets/auth_user_store.js"></script>
    <script src="/assets/auth_local.js"></script>
    <nav class="top-nav demo-unified-nav" id="demo-unified-nav" aria-label="Main"></nav>

    <main class="wrap wrap-wide analyzing-main" lang="en-GB">
      <section
        class="card analyzing-card analyzing-card--p11"
        aria-live="polite"
        aria-busy="true"
      >
        <div class="analyzing-spinner" aria-hidden="true"></div>
        <h1 class="analyzing-title">Analyzing your rental property...</h1>
        <p class="hint analyzing-lead">
          This usually takes a few seconds. Please keep this page open.
        </p>

        <ul class="analyzing-step-list">
          <li>Checking rent and affordability</li>
          <li>Reviewing possible contract risks</li>
          <li>Assessing location and property details</li>
          <li>Preparing your recommendation</li>
        </ul>

        <p class="hint muted small-print" id="analyzing-status-text">Working on your analysis...</p>
      </section>
    </main>
    <script src="/assets/api_config.js"></script>
    <script>
      (function () {
        var PENDING_KEY = "rentalai_analyze_pending_v1";

        function attachLoggedInUserId(base) {
          try {
            if (
              sessionStorage.getItem("rentalai_login_status") === "logged_in" &&
              sessionStorage.getItem("rentalai_user_id")
            ) {
              var uid = String(sessionStorage.getItem("rentalai_user_id") || "").trim();
              if (uid) base.user_id = uid;
            }
          } catch (e2) {}
          return base;
        }

        function buildAnalyzeBody() {
          var base = {
            rent: 1250,
            budget: 1500,
            commute_minutes: 30,
            bedrooms: 1,
            bills_included: false,
            postcode: "M1",
          };
          try {
            var raw = sessionStorage.getItem(PENDING_KEY);
            if (raw) {
              var p = JSON.parse(raw);
              sessionStorage.removeItem(PENDING_KEY);
              var ut = p && p.user_text != null ? String(p.user_text).trim() : "";
              if (ut) {
                base.area = ut;
                return attachLoggedInUserId(base);
              }
            }
          } catch (e1) {}
          base.area = "Manchester";
          return attachLoggedInUserId(base);
        }

        function goError() {
          window.location.href = "/analysis-error";
        }

        function goSuccess(response) {
          var payload =
            response && response.data !== undefined && response.data !== null
              ? response.data
              : response;
          try {
            if (payload !== undefined && payload !== null) {
              sessionStorage.setItem("rentalai_result", JSON.stringify(payload));
            }
          } catch (e0) {}
          try {
            var data = response;
            localStorage.setItem("rentalai_latest_result_v1", JSON.stringify(data));
            sessionStorage.setItem("rentalai_direct_analyze_result_v1", JSON.stringify(data));
          } catch (e) {
            goError();
            return;
          }
          window.location.href = "/ai-result";
        }

        function run() {
          var init = {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(buildAnalyzeBody()),
          };
          if (typeof window.rentalaiMergeAuthHeaders === "function") {
            init.headers = window.rentalaiMergeAuthHeaders(init.headers);
          }
          var req =
            typeof window.rentalaiApiFetch === "function"
              ? window.rentalaiApiFetch("/analyze", init)
              : fetch(
                  typeof window.rentalaiApiUrl === "function"
                    ? window.rentalaiApiUrl("/analyze")
                    : "/analyze",
                  init
                );
          req
            .then(function (r) {
              if (!r.ok) throw new Error("analyze_http_" + r.status);
              return r.json();
            })
            .then(goSuccess)
            .catch(goError);
        }

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", run);
        } else {
          run();
        }
      })();
    </script>
  </body>
</html>
