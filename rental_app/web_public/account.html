<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My RentalAI Account</title>
    <link rel="stylesheet" href="/assets/style.css" />
    <style>
      /* Phase12 Step1-4: auth pages — align with home / SaaS hero */
      .auth-page-body {
        margin: 0;
        min-height: 100vh;
        box-sizing: border-box;
        background: linear-gradient(175deg, #eef2f7 0%, #e8edf4 50%, #f1f5f9 100%);
      }
      .auth-page-main {
        max-width: 26rem;
        margin: 0 auto;
        padding: 2rem 1.25rem 2.5rem;
        box-sizing: border-box;
      }
      .auth-page-card.card {
        padding: 1.75rem 1.5rem 1.6rem;
        border-radius: 16px;
        border: 1px solid #e2e8f0;
        box-shadow: 0 4px 24px rgba(15, 23, 42, 0.08);
        background: #fff;
      }
      .auth-page-kicker {
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #64748b;
        margin: 0 0 0.5rem;
      }
      .auth-page-card .section-title {
        margin-top: 0;
        margin-bottom: 0.35rem;
      }
      .auth-subtitle {
        font-size: 1.05rem;
        margin: 1.1rem 0 0.45rem;
      }
      .auth-status-panel {
        margin-top: 0.75rem;
        padding: 0.85rem 1rem;
        border-radius: 10px;
        border: 1px solid #e2e8f0;
        background: linear-gradient(160deg, #f8fafc 0%, #f1f5f9 100%);
      }
      .auth-status-panel .auth-status-label {
        margin: 0 0 0.35rem;
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #64748b;
      }
      .auth-status-panel .hint {
        margin: 0;
        color: #334155;
      }
      .auth-records-block {
        margin-top: 1rem;
      }
      .auth-records-placeholder {
        margin: 0;
        padding: 1rem 1rem;
        border-radius: 10px;
        border: 1px dashed #cbd5e1;
        background: #f8fafc;
        text-align: center;
        font-size: 0.92rem;
      }
      .auth-page-links {
        margin-top: 1.15rem;
        padding-top: 1.05rem;
        border-top: 1px solid #f1f5f9;
      }
      .auth-page-links .hint {
        margin: 0;
      }
      .auth-page-back a {
        font-weight: 500;
      }
      .account-logout-row {
        margin-top: 0.75rem;
      }
      .account-logout-row .saas-btn {
        width: 100%;
        box-sizing: border-box;
        font: inherit;
        cursor: pointer;
      }
      .account-records-root {
        margin: 0;
      }
      #account-records-status {
        margin: 0;
      }
      .account-records-list {
        margin-top: 0.65rem;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .account-record-row {
        padding: 0.95rem 1rem;
        border-radius: 12px;
        border: 1px solid #dbe5f0;
        background: linear-gradient(160deg, #f8fafc 0%, #f1f5f9 100%);
        box-shadow: 0 1px 3px rgba(15, 23, 42, 0.05);
        text-align: left;
      }
      .account-record-label {
        margin: 0 0 0.2rem;
        font-size: 0.74rem;
        font-weight: 700;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        color: #64748b;
      }
      .account-record-meta {
        margin: 0 0 0.6rem;
        font-size: 0.86rem;
        color: #334155;
      }
      .account-record-input {
        margin: 0 0 0.75rem;
        font-size: 0.92rem;
        color: #334155;
        line-height: 1.45;
        word-break: break-word;
      }
      .account-record-view {
        width: auto;
        font: inherit;
        cursor: pointer;
        padding: 0.48rem 0.95rem;
        font-size: 0.88rem;
      }
    </style>
  </head>
  <body class="auth-page-body">
    <main class="wrap narrow-wrap auth-page-main">
      <section class="card form-card auth-page-card" aria-labelledby="account-title">
        <p class="auth-page-kicker">RentalAI</p>
        <h1 id="account-title" class="section-title">My RentalAI Account</h1>

        <div class="auth-status-panel" aria-label="Account status">
          <p class="auth-status-label">Account status</p>

          <div id="account-state-logged-in" class="hidden">
            <p class="hint" id="account-email-line"></p>
            <div class="account-logout-row">
              <button type="button" id="account-logout-btn" class="saas-btn saas-btn--primary">
                Logout
              </button>
            </div>
          </div>

          <div id="account-state-logged-out">
            <p class="hint">You are not logged in.</p>
            <p class="hint small-print">
              <a href="/login">Login</a>
            </p>
          </div>
        </div>

        <div class="auth-records-block">
          <h2 class="section-title auth-subtitle">Saved analysis records</h2>
          <div class="account-records-root" aria-label="Saved analysis records">
            <p id="account-records-status" class="hint muted"></p>
            <div id="account-records-list" class="account-records-list hidden"></div>
          </div>
        </div>

        <div class="auth-page-links">
          <p class="hint small-print auth-page-back">
            <a href="/">Back to home</a>
          </p>
        </div>
      </section>
    </main>
    <script src="/assets/api_config.js"></script>
    <script src="/assets/account_page.js"></script>
  </body>
</html>
