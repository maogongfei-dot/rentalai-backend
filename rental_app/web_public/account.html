<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My RentalAI Account</title>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body class="page-shell-bg">
    <main class="container container--auth">
      <section class="card form-card auth-page-card" aria-labelledby="account-title">
        <p class="auth-page-kicker">RentalAI</p>
        <h1 id="account-title" class="page-title">My RentalAI Account</h1>
        <p class="page-subtitle">Session status and your saved contract analyses.</p>

        <div class="auth-status-panel" aria-label="Account status">
          <p class="auth-status-label">Account status</p>

          <div id="account-state-logged-in" class="hidden">
            <p class="hint" id="account-email-line"></p>
            <div class="account-logout-row">
              <button type="button" id="account-logout-btn" class="saas-btn saas-btn--primary">
                Logout
              </button>
            </div>
          </div>

          <div id="account-state-logged-out">
            <p class="hint">You are not logged in.</p>
            <p class="hint small-print">
              <a href="/login">Login</a>
            </p>
          </div>
        </div>

        <div class="auth-records-block">
          <h2 class="auth-section-title">Saved analysis records</h2>
          <div class="account-records-root" aria-label="Saved analysis records">
            <p id="account-records-status" class="hint muted"></p>
            <div id="account-records-list" class="account-records-list hidden"></div>
          </div>
        </div>

        <div class="auth-page-links">
          <p class="hint small-print auth-page-back">
            <a href="/">Back to home</a>
          </p>
        </div>
      </section>
    </main>
    <script src="/assets/api_config.js"></script>
    <script src="/assets/account_page.js"></script>
  </body>
</html>
