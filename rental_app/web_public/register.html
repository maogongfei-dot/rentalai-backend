<!DOCTYPE html>
<!--
  Phase 5 Step1：注册骨架 — 邮箱/密码提交至 POST /auth/register（见 register_page.js）
-->
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>注册 · RentalAI</title>
    <link rel="stylesheet" href="/assets/style.css" />
    <script src="/assets/api_config.js"></script>
  </head>
  <body>
    <script src="/assets/auth_user_store.js"></script>
    <script src="/assets/auth_local.js"></script>
    <nav class="top-nav demo-unified-nav" id="demo-unified-nav" aria-label="Main"></nav>

    <main class="wrap narrow-wrap">
      <h1 class="section-title">注册 RentalAI</h1>
      <p class="hint">
        创建账户后使用邮箱与密码登录（<code>/auth/register</code>）。已有账号请
        <a href="/login">登录</a>。
      </p>

      <section class="card form-card">
        <form id="register-form" class="auth-form" autocomplete="on">
          <label class="field-label" for="register-email">邮箱</label>
          <input
            id="register-email"
            name="email"
            type="email"
            required
            autocomplete="username"
            placeholder="you@example.com"
          />

          <label class="field-label" for="register-password">密码</label>
          <input
            id="register-password"
            name="password"
            type="password"
            required
            minlength="4"
            autocomplete="new-password"
          />

          <div class="actions-row">
            <button type="submit" class="auth-submit">注册</button>
          </div>
        </form>
      </section>

      <p id="register-err" class="err hidden" role="alert"></p>
      <p class="hint small-print login-hint">
        <a href="/login">返回登录</a>
        <span class="hint muted"> · </span>
        <a href="/">首页</a>
      </p>
    </main>

    <script src="/assets/auth_session.js"></script>
    <script src="/assets/register_page.js"></script>
  </body>
</html>
