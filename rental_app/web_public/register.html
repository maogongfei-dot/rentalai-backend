<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create your RentalAI account</title>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body class="page-shell-bg">
    <main class="container container--auth">
      <section class="card form-card auth-page-card" aria-labelledby="register-title">
        <p class="auth-page-kicker">RentalAI</p>
        <h1 id="register-title" class="page-title">Create your RentalAI account</h1>
        <p class="page-subtitle">Register to save analyses and keep your history in one place.</p>

        <form id="register-form" class="auth-form auth-page-form" autocomplete="on">
          <p
            id="register-err"
            class="auth-form-msg auth-form-msg--error hidden"
            role="alert"
            aria-live="polite"
          ></p>
          <p
            id="register-success"
            class="auth-form-msg auth-form-msg--success hidden"
            role="status"
            aria-live="polite"
          ></p>

          <label class="field-label" for="register-email">Email</label>
          <input
            id="register-email"
            class="page-form-control"
            name="email"
            type="email"
            autocomplete="username"
            placeholder="you@example.com"
          />

          <label class="field-label" for="register-password">Password</label>
          <input
            id="register-password"
            class="page-form-control"
            name="password"
            type="password"
            autocomplete="new-password"
            placeholder="Create a password"
          />

          <label class="field-label" for="register-confirm-password">Confirm password</label>
          <input
            id="register-confirm-password"
            class="page-form-control"
            name="confirm_password"
            type="password"
            autocomplete="new-password"
            placeholder="Repeat your password"
          />

          <div class="actions-row">
            <button type="submit" id="register-submit-btn" class="saas-btn saas-btn--primary">
              Register
            </button>
          </div>
        </form>

        <div class="auth-page-links">
          <p class="hint small-print">
            Already have an account?
            <a href="/login">Login</a>
          </p>
          <p class="hint small-print auth-page-back">
            <a href="/">Back to home</a>
          </p>
        </div>
      </section>
    </main>
    <script src="/assets/api_config.js"></script>
    <script src="/assets/register_page.js"></script>
  </body>
</html>
