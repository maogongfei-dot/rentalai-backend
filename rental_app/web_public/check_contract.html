<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="rentalai-api-base" content="" />
    <meta name="vite-rentalai-api-base" content="" />
    <meta name="rentalai-env" content="" />
    <title>Check your rental contract · RentalAI</title>
    <link rel="stylesheet" href="/assets/style.css" />
    <script src="/assets/api_config.js"></script>
  </head>
  <body class="check-contract-page-body">
    <script src="/assets/auth_user_store.js"></script>
    <script src="/assets/auth_local.js"></script>
    <nav class="top-nav demo-unified-nav" id="demo-unified-nav" aria-label="Main"></nav>
    <main class="wrap wrap-wide check-contract-main" lang="en-GB">
      <p class="back-link">
        <a href="/">Home</a>
      </p>

      <header class="check-contract-header">
        <p class="saas-hero-kicker">RentalAI</p>
        <h1 class="check-contract-title">Check your rental contract</h1>
        <p class="hint check-contract-prompt">
          Paste your contract text or upload a file to identify key risks before signing.
        </p>
      </header>

      <section class="card saas-hero check-contract-input-card">
        <label class="field-label" for="contract-paste-input">Contract text</label>
        <textarea
          id="contract-paste-input"
          rows="9"
          class="check-contract-textarea"
          placeholder="Paste contract clauses, deposit terms, break clause details, repairs obligations, or service charge terms..."
        ></textarea>

        <div class="check-contract-upload-zone">
          <label class="field-label" for="contract-file-input">Upload contract file (placeholder)</label>
          <input id="contract-file-input" class="check-contract-file" type="file" accept=".txt,.pdf,.doc,.docx" />
          <p class="hint muted small-print" id="contract-file-hint">No file selected.</p>
        </div>

        <div class="check-contract-actions">
          <button type="button" class="saas-btn saas-btn--primary" id="contract-analyze-btn">
            Analyze Contract
          </button>
        </div>
        <p id="contract-analyze-err" class="err hidden" role="alert" aria-live="assertive"></p>
      </section>

      <section id="contract-result" class="card check-contract-result-card hidden" aria-live="polite">
        <h2 class="section-title">Contract analysis (preview)</h2>
        <div class="check-contract-block">
          <h3 class="subsection-title">Conclusion</h3>
          <p class="hint" id="contract-result-conclusion"></p>
        </div>
        <div class="check-contract-block">
          <h3 class="subsection-title">Risk Clauses</h3>
          <ul class="check-contract-list" id="contract-result-risks"></ul>
        </div>
        <div class="check-contract-block">
          <h3 class="subsection-title">Need To Confirm</h3>
          <ul class="check-contract-list" id="contract-result-confirm"></ul>
        </div>
        <div class="check-contract-block">
          <h3 class="subsection-title">Questions To Ask Landlord</h3>
          <ul class="check-contract-list" id="contract-result-questions"></ul>
        </div>
        <div class="check-contract-block">
          <h3 class="subsection-title">Next Step</h3>
          <p class="hint" id="contract-result-next-step"></p>
        </div>
      </section>
    </main>
    <script src="/assets/check_contract_page.js"></script>
  </body>
</html>
