<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login to RentalAI</title>
    <link rel="stylesheet" href="/assets/style.css" />
    <style>
      /* Phase12 Step1-4: auth pages — align with home / SaaS hero */
      .auth-page-body {
        margin: 0;
        min-height: 100vh;
        box-sizing: border-box;
        background: linear-gradient(175deg, #eef2f7 0%, #e8edf4 50%, #f1f5f9 100%);
      }
      .auth-page-main {
        max-width: 26rem;
        margin: 0 auto;
        padding: 2rem 1.25rem 2.5rem;
        box-sizing: border-box;
      }
      .auth-page-card.card {
        padding: 1.75rem 1.5rem 1.6rem;
        border-radius: 16px;
        border: 1px solid #e2e8f0;
        box-shadow: 0 4px 24px rgba(15, 23, 42, 0.08);
        background: #fff;
      }
      .auth-page-kicker {
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #64748b;
        margin: 0 0 0.5rem;
      }
      .auth-page-card .section-title {
        margin-top: 0;
        margin-bottom: 0.35rem;
      }
      .auth-page-form.auth-form input[type="email"],
      .auth-page-form.auth-form input[type="password"] {
        width: 100%;
        box-sizing: border-box;
        padding: 0.6rem 0.75rem;
        border-radius: 10px;
        border: 1px solid #cbd5e1;
        background: #fff;
        font-size: 1rem;
        line-height: 1.45;
        color: #0f172a;
      }
      .auth-page-form.auth-form input:focus {
        outline: none;
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
      }
      .auth-page-form .actions-row {
        margin-top: 0.65rem;
      }
      .auth-page-form .actions-row .saas-btn {
        width: 100%;
        box-sizing: border-box;
        font: inherit;
        cursor: pointer;
      }
      .auth-page-links {
        margin-top: 1.15rem;
        padding-top: 1.05rem;
        border-top: 1px solid #f1f5f9;
      }
      .auth-page-links .hint {
        margin: 0 0 0.5rem;
      }
      .auth-page-links .hint:last-child {
        margin-bottom: 0;
      }
      .auth-page-back a {
        font-weight: 500;
      }
      .auth-form-msg {
        margin: 0.75rem 0 0;
        padding: 0.55rem 0.7rem;
        border-radius: 10px;
        font-size: 0.9rem;
        line-height: 1.4;
      }
      .auth-form-msg--error {
        color: #b91c1c;
        background: #fef2f2;
        border: 1px solid #fecaca;
      }
    </style>
  </head>
  <body class="auth-page-body">
    <main class="wrap narrow-wrap auth-page-main">
      <section class="card form-card auth-page-card" aria-labelledby="login-title">
        <p class="auth-page-kicker">RentalAI</p>
        <h1 id="login-title" class="section-title">Login to RentalAI</h1>

        <form id="login-form" class="auth-form auth-page-form" autocomplete="on">
          <p
            id="login-err"
            class="auth-form-msg auth-form-msg--error hidden"
            role="alert"
            aria-live="polite"
          ></p>

          <label class="field-label" for="login-email">Email</label>
          <input
            id="login-email"
            name="email"
            type="email"
            autocomplete="username"
            placeholder="you@example.com"
          />

          <label class="field-label" for="login-password">Password</label>
          <input
            id="login-password"
            name="password"
            type="password"
            autocomplete="current-password"
            placeholder="Enter your password"
          />

          <div class="actions-row">
            <button type="submit" id="login-submit-btn" class="saas-btn saas-btn--primary">Login</button>
          </div>
        </form>

        <div class="auth-page-links">
          <p class="hint small-print">
            New to RentalAI?
            <a href="/register">Create an account</a>
          </p>
          <p class="hint small-print auth-page-back">
            <a href="/">Back to home</a>
          </p>
        </div>
      </section>
    </main>
    <script src="/assets/api_config.js"></script>
    <script src="/assets/login_page.js"></script>
  </body>
</html>
