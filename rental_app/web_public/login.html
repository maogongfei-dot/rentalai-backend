<!DOCTYPE html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>登录 RentalAI</title>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <nav class="top-nav" aria-label="Main">
      <span class="hint">RentalAI</span>
    </nav>
    <main class="wrap narrow-wrap">
      <h1 class="section-title">登录 RentalAI</h1>
      <p class="hint">本地演示账号，无需密码。</p>

      <div class="card form-card">
        <label class="field-label" for="local-login-input">用户名或邮箱</label>
        <input
          id="local-login-input"
          type="text"
          autocomplete="username"
          placeholder="例如：Alex 或 alex@example.com"
        />
        <div class="actions-row">
          <button type="button" id="local-login-go">进入我的租房助手</button>
        </div>
      </div>
    </main>
    <script src="/assets/login_local_page.js"></script>
  </body>
</html>
