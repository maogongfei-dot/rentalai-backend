<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login to RentalAI</title>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body class="page-shell-bg">
    <main class="container container--auth">
      <section class="card form-card auth-page-card" aria-labelledby="login-title">
        <p class="auth-page-kicker">RentalAI</p>
        <h1 id="login-title" class="page-title">Login to RentalAI</h1>
        <p class="page-subtitle">Sign in with your email and password to access saved analyses.</p>

        <form id="login-form" class="auth-form auth-page-form" autocomplete="on">
          <p
            id="login-err"
            class="auth-form-msg auth-form-msg--error hidden"
            role="alert"
            aria-live="polite"
          ></p>

          <label class="field-label" for="login-email">Email</label>
          <input
            id="login-email"
            class="page-form-control"
            name="email"
            type="email"
            autocomplete="username"
            placeholder="you@example.com"
          />

          <label class="field-label" for="login-password">Password</label>
          <input
            id="login-password"
            class="page-form-control"
            name="password"
            type="password"
            autocomplete="current-password"
            placeholder="Enter your password"
          />

          <div class="actions-row">
            <button type="submit" id="login-submit-btn" class="saas-btn saas-btn--primary">Login</button>
          </div>
        </form>

        <div class="auth-page-links">
          <p class="hint small-print">
            New to RentalAI?
            <a href="/register">Create an account</a>
          </p>
          <p class="hint small-print auth-page-back">
            <a href="/">Back to home</a>
          </p>
        </div>
      </section>
    </main>
    <script src="/assets/api_config.js"></script>
    <script src="/assets/login_page.js"></script>
  </body>
</html>
