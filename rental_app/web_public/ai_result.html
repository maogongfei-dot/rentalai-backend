<!DOCTYPE html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>需求解析结果 · RentalAI</title>
    <link rel="stylesheet" href="/assets/style.css" />
    <script src="/assets/api_config.js"></script>
  </head>
  <body>
    <script src="/assets/auth_local.js"></script>
    <nav class="top-nav demo-unified-nav" id="demo-unified-nav" aria-label="Main"></nav>

    <main class="wrap wrap-wide result-wrap result-page-ui">
      <header class="page-header">
        <h1>需求解析结果</h1>
      </header>

      <section class="card result-actions" aria-label="结果页操作">
        <button type="button" class="save-analysis-btn">保存本次分析</button>
        <span class="nav-sep">·</span>
        <a href="/history">查看历史记录</a>
        <span class="nav-sep">·</span>
        <a href="/compare">查看收藏对比</a>
        <span class="nav-sep">·</span>
        <a href="/">返回首页重新分析</a>
      </section>

      <!-- P10-4：/api/ai/query 联调展示 -->
      <div id="housing-mode" class="hidden">
        <div id="housing-missing-location" class="card card-warn hidden" role="alert"></div>
        <div id="housing-empty-hint" class="card empty-state-card hidden"></div>
        <p id="housing-banner" class="hint muted" role="status"></p>
        <div id="housing-errors" class="err hidden" role="alert"></div>

        <section class="card" aria-labelledby="hq-heading">
          <h2 id="hq-heading" class="section-title">Query Summary</h2>
          <div id="housing-query-summary" class="kv-block"></div>
        </section>

        <section class="card" aria-labelledby="hm-heading">
          <h2 id="hm-heading" class="section-title">Market Summary</h2>
          <div id="housing-market-summary" class="kv-block scroll-panel"></div>
        </section>

        <section class="card" aria-labelledby="ht-heading">
          <h2 id="ht-heading" class="section-title">选房推荐</h2>
          <p id="housing-deals-meta" class="hint muted deals-intro"></p>
          <div id="housing-top-deals" class="deals-grid"></div>
        </section>

        <section class="card" aria-labelledby="hr-heading">
          <h2 id="hr-heading" class="section-title">市场印象</h2>
          <div id="housing-report" class="report-stack report-enhanced"></div>
        </section>

        <section class="card card-star-verdict" aria-labelledby="fv-heading">
          <h2 id="fv-heading" class="section-title">综合结论</h2>
          <p class="hint muted verdict-intro">帮你把几套里「先看谁、为什么」说清楚，用语尽量直白。</p>
          <div id="housing-star-verdict" class="star-verdict-stack"></div>
        </section>
      </div>

      <!-- 旧版 /api/ai-analyze -->
      <div id="legacy-mode">
        <section class="card" id="block-query" aria-labelledby="q-heading">
          <h2 id="q-heading" class="section-title">你刚刚输入的需求</h2>
          <p id="raw-display" class="hint">—</p>
        </section>

        <section class="card" id="block-structured" aria-labelledby="s-heading">
          <h2 id="s-heading" class="section-title">结构化解析结果</h2>
          <dl id="structured-dl" class="kv-list"></dl>
        </section>

        <section class="card" id="block-reco" aria-labelledby="r-heading">
          <h2 id="r-heading" class="section-title">推荐结果</h2>
          <p id="summary-line" class="hint muted"></p>
          <div id="reco-empty" class="hint hidden">当前没有找到合适房源</div>
          <ul id="reco-list" class="reco-list"></ul>
        </section>
      </div>
    </main>
    <script src="/assets/ai_result_page.js"></script>
  </body>
</html>
