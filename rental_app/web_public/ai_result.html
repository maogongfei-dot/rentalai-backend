<!DOCTYPE html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>需求解析结果 · RentalAI</title>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <script src="/assets/auth_local.js"></script>
    <nav class="top-nav demo-unified-nav" id="demo-unified-nav" aria-label="Main"></nav>

    <main class="wrap wrap-wide result-wrap">
      <header class="page-header">
        <h1>需求解析结果</h1>
      </header>

      <section class="card result-actions" aria-label="结果页操作">
        <button type="button" class="save-analysis-btn">保存本次分析</button>
        <span class="nav-sep">·</span>
        <a href="/history">查看历史记录</a>
        <span class="nav-sep">·</span>
        <a href="/compare">查看收藏对比</a>
        <span class="nav-sep">·</span>
        <a href="/">返回首页重新分析</a>
      </section>

      <section class="card" id="block-query" aria-labelledby="q-heading">
        <h2 id="q-heading" class="section-title">你刚刚输入的需求</h2>
        <p id="raw-display" class="hint">—</p>
      </section>

      <section class="card" id="block-structured" aria-labelledby="s-heading">
        <h2 id="s-heading" class="section-title">结构化解析结果</h2>
        <dl id="structured-dl" class="kv-list"></dl>
      </section>

      <section class="card" id="block-reco" aria-labelledby="r-heading">
        <h2 id="r-heading" class="section-title">推荐结果</h2>
        <p id="summary-line" class="hint muted"></p>
        <div id="reco-empty" class="hint hidden">当前没有找到合适房源</div>
        <ul id="reco-list" class="reco-list"></ul>
      </section>
    </main>
    <script src="/assets/ai_result_page.js"></script>
  </body>
</html>
